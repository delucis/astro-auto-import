name: CI
permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Automatically cancel in-progress actions on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request_target' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        astro: [^5, ^6, ^7]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install Dependencies
        run: pnpm i

      - run: pnpm i --workspace-root astro@${{ matrix.astro }}
      - run: pnpm i astro@${{ matrix.astro }}
        working-directory: packages/astro-auto-import
      - run: pnpm i astro@${{ matrix.astro }} @astrojs/mdx@${{ env.MDX_VERSION }}
        env:
          MDX_VERSION: ${{ matrix.astro == '^5' && '^4' || matrix.astro == '^6' && '^5' || '^7' }}
        working-directory: demo
      - if: matrix.astro == '^5'
        run: pnpm un @astrojs/markdown-remark
        working-directory: demo

      - name: Test
        run: pnpm t
